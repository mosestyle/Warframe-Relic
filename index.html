<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moses - Warframe Relic Reward Values</title>
  <link rel="stylesheet" href="style.css?v=1" />
</head>

<body>
  <div class="wrap">
    <header class="top">
      <h1>Moses - Warframe Relic Reward Values</h1>
      <p class="subtitle">
        Pick 1-4 relics • See all possible rewards • Sort by platinum value
        <span class="dot available"></span> Available / Unvaulted
        <span class="dot vaulted"></span> Vaulted.
      </p>
    </header>

    <section class="panel">
      <div class="pickers">
        <div class="picker">
          <div class="pickerLabel">Relic 1</div>
          <button class="pickerBtn" data-target="r1"><span id="r1Text" class="pickerPlaceholder">Tap to choose (Lith/Meso/Neo/Axi)</span></button>
        </div>
        <div class="picker">
          <div class="pickerLabel">Relic 2</div>
          <button class="pickerBtn" data-target="r2"><span id="r2Text" class="pickerPlaceholder">Tap to choose (Lith/Meso/Neo/Axi)</span></button>
        </div>
        <div class="picker">
          <div class="pickerLabel">Relic 3</div>
          <button class="pickerBtn" data-target="r3"><span id="r3Text" class="pickerPlaceholder">Tap to choose (Lith/Meso/Neo/Axi)</span></button>
        </div>
        <div class="picker">
          <div class="pickerLabel">Relic 4</div>
          <button class="pickerBtn" data-target="r4"><span id="r4Text" class="pickerPlaceholder">Tap to choose (Lith/Meso/Neo/Axi)</span></button>
        </div>
      </div>

      <div class="actions">
        <button id="btnShow" class="btn primary">Show rewards</button>
        <button id="btnClear" class="btn">Clear</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section id="cards" class="cards"></section>

    <footer id="footer" class="footer"></footer>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalBackdrop"></div>
    <div class="modalCard">
      <div class="modalTop">
        <button id="modalClose" class="modalClose" aria-label="Close">✕</button>
        <div class="modalTitleRow">
          <div id="modalTitle" class="modalTitle">Choose relic</div>
          <div class="modeButtons">
            <button id="modeRelics" class="modeBtn active">Relics</button>
            <button id="modeItems" class="modeBtn">Items</button>
          </div>
        </div>
      </div>

      <div class="modalBody">
        <input id="modalSearch" class="modalSearch" placeholder="Search: e.g. Meso C1 / Neo N16 / Axi S18" />

        <div class="modalFilterRow">
          <div class="filterButtons">
            <button id="rfAll" class="filterBtn active">All</button>
            <button id="rfAvail" class="filterBtn">Available</button>
            <button id="rfVault" class="filterBtn">Vaulted</button>
          </div>
          <div id="vaultHint" class="vaultHint">Available: 0 • Vaulted: 0</div>
        </div>

        <div id="modalList" class="modalList"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
