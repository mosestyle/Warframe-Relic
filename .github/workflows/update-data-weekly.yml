name: Update Relic + Price Data (Weekly)

on:
  schedule:
    # 20:00 UTC Sundays (≈ 21:00 Sweden in winter, 22:00 in summer)
    - cron: "0 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate data (Relics + Prices)
        run: |
          python scripts/update_data.py
          echo "=== data folder contents ==="
          ls -la data || true

      - name: Commit & push if changed (force add data/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # data/ is often in .gitignore; force-add generated files
          git add -f data/ || true
          git add -f scripts/missing_prices.txt || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update relic + price data"
          git push
