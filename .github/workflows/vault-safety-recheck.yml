name: Vault Safety Re-Check (After Data Update)

on:
  workflow_run:
    workflows: ["Update Relics + Prices (On Vault Change)"]
    types:
      - completed

permissions:
  contents: write

jobs:
  safety-check:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run vault re-check
        run: python scripts/update_vault_status.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/vaultStatus.json
          git diff --cached --quiet || git commit -m "Safety vault re-check after data update"
          git push
