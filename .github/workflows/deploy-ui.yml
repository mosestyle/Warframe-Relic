name: Deploy UI to GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Vault Safety Re-Check (After Data Update)"]
    types: [completed]
  # Optional (recommended): if you edit UI files and push, deploy automatically.
  push:
    branches: [main]
    paths:
      - "index.html"
      - "app.js"
      - "style.css"
      - "data/**"

permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    # Allow BOTH workflow_run success AND manual dispatch AND push
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you use a custom deploy method, keep it here.
      # This is a simple "commit if changed" deploy pattern.
      - name: Ensure data is present
        run: ls -la data || true

      - name: Commit & push if needed (UI/data)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy UI/data"
          git push
