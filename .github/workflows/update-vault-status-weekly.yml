name: Update Vault Status (Wiki)

on:
  workflow_dispatch:
  schedule:
    # Every Monday 21:00 Sweden time (UTC+1 winter / UTC+2 summer).
    # GitHub cron is UTC, so use 20:00 UTC (winter) / 19:00 UTC (summer).
    # Pick one. Most people pick 20:00 UTC and accept 1h shift in summer.
    - cron: "0 20 * * 1"

permissions:
  contents: write

concurrency:
  group: "vault-status"
  cancel-in-progress: true

jobs:
  vault:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate vaultStatus.json from Wiki
        run: |
          python scripts/update_vault_status.py
          ls -la data || true
          test -f data/vaultStatus.json

      - name: Commit vaultStatus.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/vaultStatus.json

          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update vault status (wiki)"
          git push
