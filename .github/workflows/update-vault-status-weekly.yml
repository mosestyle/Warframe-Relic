name: Update Vault Status (Wiki)

on:
  workflow_dispatch:
  schedule:
    # Friday 21:00 UTC (23:00 Sweden in summer, 22:00 in winter)
    - cron: "0 21 * * 5"

permissions:
  contents: write

concurrency:
  group: "vault-status"
  cancel-in-progress: true

jobs:
  vault:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate vaultStatus.json from Wiki
        run: |
          python scripts/update_vault_status.py
          test -f data/vaultStatus.json

      - name: Commit vaultStatus.json (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/vaultStatus.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update vault status (wiki)"
          git push
