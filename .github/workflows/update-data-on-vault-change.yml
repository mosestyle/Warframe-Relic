name: Update Relics + Prices (On Vault Change)

on:
  push:
    branches:
      - main
    paths:
      - "data/vaultStatus.json"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run update_data.py
        run: python scripts/update_data.py

      - name: Commit data changes (if any)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto-update relic + price data (vault change)"
          git push
