name: Update Relics + Prices (On Vault Change)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Vault Status (Wiki)"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: "relic-price-update"
  cancel-in-progress: true

jobs:
  update-data:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate data (Relics + Prices)
        run: |
          python scripts/update_data.py
          ls -la data || true

      - name: Commit & push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/ || true
          git add -f scripts/missing_prices.txt || true

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update relic + price data"
          git push
