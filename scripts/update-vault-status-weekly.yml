name: Update Vault Status (Wiki)

on:
  workflow_dispatch:
  schedule:
    # 20:00 UTC on Sundays (≈ 21:00 Sweden winter, 22:00 summer)
    - cron: "0 20 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate vault status (wiki)
        run: |
          python scripts/update_vault_status.py
          echo "=== data folder contents ==="
          ls -la data || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
